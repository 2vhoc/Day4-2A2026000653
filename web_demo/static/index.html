<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrderDesk AI Demo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --bot-bubble: rgba(99, 102, 241, 0.2);
            --user-bubble: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            display: flex;
            flex-direction: column;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .header-title h1 {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .header-title p {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .chat-window {
            flex: 1;
            padding: 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            max-width: 80%;
            padding: 16px;
            border-radius: 16px;
            line-height: 1.5;
            animation: fadeIn 0.3s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            align-self: flex-end;
            background: var(--user-bubble);
            border: 1px solid var(--glass-border);
            border-bottom-right-radius: 4px;
        }

        .message.bot {
            align-self: flex-start;
            background: var(--bot-bubble);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-bottom-left-radius: 4px;
        }

        .tool-trace {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-family: monospace;
        }
        
        .tool-badge {
            display: inline-block;
            background: rgba(255,255,255,0.1);
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 4px;
            margin-bottom: 4px;
        }

        .order-card {
            margin-top: 12px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
        }

        .input-area {
            padding: 20px 24px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.2);
        }

        input {
            flex: 1;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 14px 20px;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 24px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(1px);
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 4px 8px;
            align-items: center;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="header-icon">AI</div>
            <div class="header-title">
                <h1>OrderDesk Agent</h1>
                <p>Powered by LangGraph & Pydantic</p>
            </div>
        </div>

        <div class="chat-window" id="chatWindow">
            <div class="message bot">
                <div>Xin chào! Tôi là trợ lý bán hàng điện tử. Bạn đang tìm mua sản phẩm gì hôm nay?</div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="userInput" placeholder="Nhập yêu cầu của bạn (VD: Tìm mua màn hình...)" autocomplete="off">
            <button id="sendBtn">Gửi</button>
        </div>
    </div>

    <script>
        const chatWindow = document.getElementById('chatWindow');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        function scrollToBottom() {
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        function appendMessage(type, content, extraHTML = "") {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = `<div>${content}</div>${extraHTML}`;
            chatWindow.appendChild(div);
            scrollToBottom();
            return div;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = `message bot typing`;
            div.id = 'typingIndicator';
            div.innerHTML = `
                <div class="typing-indicator">
                    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                </div>
            `;
            chatWindow.appendChild(div);
            scrollToBottom();
        }

        function hideTyping() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // User message
            appendMessage('user', text);
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;

            showTyping();

            try {
                const response = await fetch('http://localhost:5000/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: text })
                });

                const data = await response.json();
                hideTyping();

                if (data.error) {
                    appendMessage('bot', `⚠️ Lỗi hệ thống: ${data.error}`);
                    return;
                }

                // Format tool calls
                let toolsHTML = '';
                if (data.tool_calls && data.tool_calls.length > 0) {
                    toolsHTML += `<div class="tool-trace">🔧 Tools used:<br>`;
                    data.tool_calls.forEach(tc => {
                        toolsHTML += `<span class="tool-badge">${tc.name}</span>`;
                    });
                    toolsHTML += `</div>`;
                }

                // Format saved order if any
                let orderHTML = '';
                if (data.saved_order) {
                    orderHTML += `<div class="order-card">
                        <strong>✅ Đã chốt đơn: ${data.saved_order.order_id}</strong><br>
                        Khách: ${data.saved_order.customer.name}<br>
                        Tổng: ${data.saved_order.pricing.final_total.toLocaleString()}đ<br>
                        Lưu tại: <code>${data.saved_order_path}</code>
                    </div>`;
                }

                // Render markdown line breaks roughly
                const formattedAnswer = data.answer.replace(/\n/g, '<br>');
                
                appendMessage('bot', formattedAnswer, toolsHTML + orderHTML);

            } catch (err) {
                hideTyping();
                appendMessage('bot', `⚠️ Lỗi mạng: Không thể kết nối tới server. Có thể API Model phản hồi quá chậm.`);
            } finally {
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        userInput.focus();
    </script>
</body>
</html>
